name: Build Android artifacts

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.44.7'
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android SDK 36
        run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'

      - name: Install dependencies from lockfile
        run: flutter pub get --enforce-lockfile

      - name: Generate Drift files
        run: dart run build_runner build

      - name: Reject uncommitted generated output
        run: git diff --exit-code

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test tool packages

      - name: Analyze source code
        run: flutter analyze --no-pub

      - name: Run tests
        run: flutter test --no-pub

      - name: Build unsigned release artifacts
        run: |
          flutter build apk --release --no-pub
          flutter build appbundle --release --no-pub

      - name: Verify artifacts are unsigned
        shell: bash
        run: |
          set -euo pipefail
          APK='build/app/outputs/flutter-apk/app-release.apk'
          AAB='build/app/outputs/bundle/release/app-release.aab'
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner"

          test -s "$APK"
          test -s "$AAB"

          if "$APKSIGNER" verify "$APK" >/dev/null 2>&1; then
            echo '::error::Ordinary CI unexpectedly produced a signed APK.'
            exit 1
          fi

          AAB_RESULT="$(jarsigner -verify "$AAB" 2>&1)"
          printf '%s\n' "$AAB_RESULT"
          if grep -Fq 'jar verified.' <<<"$AAB_RESULT"; then
            echo '::error::Ordinary CI unexpectedly produced a signed AAB.'
            exit 1
          fi

      - name: Create SPDX SBOM and release manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          VERSION="$(awk '/^version:/{print $2}' pubspec.yaml)"
          SAFE_VERSION="${VERSION//+/-build-}"
          APK_NAME="chronicle-${SAFE_VERSION}-android-unsigned.apk"
          AAB_NAME="chronicle-${SAFE_VERSION}-android-unsigned.aab"

          cp build/app/outputs/flutter-apk/app-release.apk "release/$APK_NAME"
          cp build/app/outputs/bundle/release/app-release.aab "release/$AAB_NAME"

          export SOURCE_DATE_EPOCH
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          dart run tool/generate_spdx_sbom.dart \
            release/chronicle-dependencies.spdx.json

          {
            printf 'Chronicle %s\n' "$VERSION"
            printf 'Commit: %s\n' "$GITHUB_SHA"
            printf 'Signing status: unsigned CI artifact\n'
          } > release/RELEASE.txt

          cd release
          sha256sum \
            "$APK_NAME" \
            "$AAB_NAME" \
            chronicle-dependencies.spdx.json \
            > SHA256SUMS.txt

      - name: Upload unsigned Android artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: chronicle-android-unsigned
          path: release/
          retention-days: 14
          if-no-files-found: error
