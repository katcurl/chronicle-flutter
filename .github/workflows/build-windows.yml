name: Build Windows desktop

permissions:
  contents: read

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.7'
          channel: stable
          cache: true

      - name: Create Windows host if missing
        shell: pwsh
        run: |
          if (-not (Test-Path windows)) {
            flutter create --platforms=windows .
          }

      - name: Show toolchain
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Drift files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package portable Windows app
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath chronicle-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: chronicle-windows-x64
          path: chronicle-windows-x64.zip
