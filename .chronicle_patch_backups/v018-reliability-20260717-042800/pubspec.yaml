name: chronicle
version: 0.17.0+22
publish_to: none
description: Local-first research, study, notes and time tracking workspace.

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  sqflite: ^2.4.2
  drift: ^2.34.1
  drift_flutter: ^0.3.1
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_markdown_plus: ^1.0.12
  markdown: ^7.3.1
  flutter_math_fork: ^0.7.4
  intl: ^0.19.0
  uuid: ^4.5.1

  crypto: ^3.0.7
  file_picker: 12.0.0-beta.7
  cryptography: ^2.9.0
  mobile_scanner: 7.2.0
  qr_flutter: ^4.1.0
  chronicle_lan_android:
    path: packages/chronicle_lan_android

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.34.2+1
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
