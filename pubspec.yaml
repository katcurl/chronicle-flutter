name: chronicle
version: 0.4.0+4
publish_to: none
description: Local-first research, study, notes and time tracking workspace.

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  flutter_markdown: ^0.7.4+1
  flutter_math_fork: ^0.7.2
  intl: ^0.19.0
  uuid: ^4.5.1
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
